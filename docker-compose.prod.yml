services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/seedcare
      JWT_SECRET: change-me-in-production
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4.1-mini
      WEATHER_API_KEY: ""
      ADMIN_EMAIL: ""
      ADMIN_PASSWORD: ""
      ADMIN_NAME: "Администратор"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: seedcare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - seedcare_prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d seedcare"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  seedcare_prod_pgdata:
