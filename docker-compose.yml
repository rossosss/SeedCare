services:
  postgres:
    image: postgres:16-alpine
    container_name: seedcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seedcare
    ports:
      - "5432:5432"
    volumes:
      - seedcare-postgres-data:/var/lib/postgresql/data

volumes:
  seedcare-postgres-data:
